name: dbt PR Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'demo_duckdb_project/**'
      - '.github/workflows/**'

jobs:
  dbt-validate:
    runs-on: ubuntu-latest
    name: Validate dbt Project

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-duckdb

      - name: dbt parse - Check syntax and schema
        run: |
          cd demo_duckdb_project
          dbt parse --profiles-dir .
        continue-on-error: false

      - name: dbt seed - Load test data
        run: |
          cd demo_duckdb_project
          dbt seed --profiles-dir . --show
        continue-on-error: false

      - name: dbt run - Build all models
        run: |
          cd demo_duckdb_project
          dbt run --profiles-dir .
        continue-on-error: false

      - name: dbt test - Data quality checks
        id: dbt-test
        run: |
          cd demo_duckdb_project
          dbt test --profiles-dir . || true

      - name: dbt docs generate - Create documentation
        run: |
          cd demo_duckdb_project
          dbt docs generate --profiles-dir . || true

      - name: Create PR Comment with Results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let comment = `## dbt Validation Results\n\n`;
            comment += `✅ **Seed**: Data loaded successfully\n`;
            comment += `✅ **Run**: All models executed\n`;
            comment += `ℹ️ **Test**: Quality checks completed (review in artifacts)\n\n`;
            comment += `### Next Steps\n`;
            comment += `- Review test results in the \`dbt-artifacts\` artifact\n`;
            comment += `- Check for any data quality issues that need attention\n`;
            comment += `- Merge when ready!\n`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: demo_duckdb_project/target/
          retention-days: 30

      - name: Upload dbt manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-manifest
          path: demo_duckdb_project/target/manifest.json
          retention-days: 30
